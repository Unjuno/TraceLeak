name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Validate sample workflows
        run: |
          python scripts/validate_trace.py --public examples/synthetic/synthetic_trace_sample.jsonl
          python scripts/validate_config.py experiments/exp_000_synthetic_leak/config.json
          python scripts/extract_model_sequence.py --in examples/synthetic/synthetic_trace_sample.jsonl --out reports/local/model_sequences.json --counts
          python scripts/evaluate_model_sequence_baseline.py --in examples/synthetic/model_sequence_baseline_sample.json --out reports/local/model_sequence_baseline_result.json
          python scripts/train_model_sequence_nn.py --in examples/synthetic/model_sequence_baseline_sample.json --out reports/local/model_sequence_nn_result.json --epochs 80 --learning-rate 0.8
          python scripts/validate_model_result.py reports/local/model_sequence_nn_result.json
          python scripts/model_result_to_report.py --in reports/local/model_sequence_nn_result.json --out reports/local/model_sequence_nn_report.md --split leave_one_out
          python scripts/train_model_sequence_nn.py --in examples/synthetic/model_sequence_nn_hard_sample.json --out reports/local/model_sequence_nn_hard_result.json --epochs 80 --learning-rate 0.8
          python scripts/validate_model_result.py reports/local/model_sequence_nn_hard_result.json
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/synthetic/model_sequence_nn_hard_sample.json --out reports/local/model_sequence_nn_hard_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/synthetic/model_sequence_nn_negative_control_sample.json --out reports/local/model_sequence_nn_control_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/synthetic/model_sequence_nn_count_pattern_sample.json --out reports/local/model_sequence_nn_count_pattern_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/synthetic/model_sequence_nn_control_seed_001.json --out reports/local/model_sequence_nn_control_seed_001_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/synthetic/model_sequence_nn_control_seed_002.json --out reports/local/model_sequence_nn_control_seed_002_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/synthetic/model_sequence_nn_control_seed_003.json --out reports/local/model_sequence_nn_control_seed_003_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/model_sequence_comparison_to_report.py --in reports/local/model_sequence_nn_count_pattern_comparison.json --control reports/local/model_sequence_nn_control_seed_001_comparison.json --control reports/local/model_sequence_nn_control_seed_002_comparison.json --control reports/local/model_sequence_nn_control_seed_003_comparison.json --out reports/local/model_sequence_nn_count_pattern_comparison.md
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/toy_rsa_like/model_sequence_nn_count_pattern_sample.json --out reports/local/toy_rsa_like_model_sequence_nn_count_pattern_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/toy_rsa_like/model_sequence_nn_control_seed_001.json --out reports/local/toy_rsa_like_model_sequence_nn_control_seed_001_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/toy_rsa_like/model_sequence_nn_control_seed_002.json --out reports/local/toy_rsa_like_model_sequence_nn_control_seed_002_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/compare_model_sequence_nn_to_baseline.py --in examples/toy_rsa_like/model_sequence_nn_control_seed_003.json --out reports/local/toy_rsa_like_model_sequence_nn_control_seed_003_comparison.json --epochs 80 --learning-rate 0.8
          python scripts/model_sequence_comparison_to_report.py --in reports/local/toy_rsa_like_model_sequence_nn_count_pattern_comparison.json --control reports/local/toy_rsa_like_model_sequence_nn_control_seed_001_comparison.json --control reports/local/toy_rsa_like_model_sequence_nn_control_seed_002_comparison.json --control reports/local/toy_rsa_like_model_sequence_nn_control_seed_003_comparison.json --out reports/local/toy_rsa_like_model_sequence_nn_count_pattern_comparison.md
          python scripts/validate_model_result.py examples/synthetic/model_result_sample.json
          python scripts/model_result_to_report.py --in examples/synthetic/model_result_sample.json --out reports/local/model_report.md
          python scripts/validate_patch_verification.py examples/synthetic/patch_verification_sample.json
          python scripts/patch_verification_to_report.py --in examples/synthetic/patch_verification_sample.json --out reports/local/patch_report.md
          python scripts/evaluate_stability.py examples/synthetic/stability_sample.json --out reports/local/stability_result.json
          python scripts/validate_claim.py examples/synthetic/claim_l5_sample.json
          python scripts/comparison_to_report.py --in examples/synthetic/comparison_sample.json --out reports/local/comparison_report.md
          python scripts/comparison_to_report.py --in examples/synthetic/negative_control_sample.json --out reports/local/negative_control_report.md
          python scripts/make_report.py --in examples/toy_rsa_like/ablation_sample.json --out reports/local/toy_rsa_like_report.md
          python scripts/comparison_to_report.py --in examples/toy_rsa_like/synthetic_vs_toy_comparison_sample.json --out reports/local/synthetic_vs_toy_report.md
          python scripts/comparison_to_report.py --in examples/synthetic/model_vs_sequence_baseline_comparison_sample.json --out reports/local/model_vs_sequence_baseline_report.md
