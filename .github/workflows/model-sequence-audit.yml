name: Model Sequence Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Run model sequence audit checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build toy trace-derived sample
        run: python scripts/build_toy_rsa_like_model_sequence_sample.py --out reports/local/toy_rsa_like_trace_derived_model_sequence.json --trace-out reports/local/toy_rsa_like_trace_derived.jsonl --runs 16

      - name: Audit labels
        run: python scripts/audit_model_sequence_labels.py --in reports/local/toy_rsa_like_trace_derived_model_sequence.json --out reports/local/toy_rsa_like_label_audit.md

      - name: Run ablation report
        run: python scripts/model_sequence_ablation_report.py --in reports/local/toy_rsa_like_trace_derived_model_sequence.json --out reports/local/toy_rsa_like_ablation_report.md --epochs 80
