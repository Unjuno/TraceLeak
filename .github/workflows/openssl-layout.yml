name: OpenSSL Layout

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  layout:
    name: Validate OpenSSL layout manifest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate layout manifest
        run: python scripts/validate_openssl_source_pin.py examples/openssl_preflight/openssl_source_pin_sample.json

      - name: Render layout report
        run: python scripts/openssl_layout_to_report.py --in examples/openssl_preflight/openssl_source_pin_sample.json --out reports/local/openssl_layout.md
