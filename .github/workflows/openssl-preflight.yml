name: OpenSSL Preflight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Validate OpenSSL preflight manifest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate manifest
        run: python scripts/validate_openssl_preflight.py examples/openssl_preflight/openssl_rsa_keygen_preflight_sample.json

      - name: Render report
        run: python scripts/openssl_preflight_to_report.py --in examples/openssl_preflight/openssl_rsa_keygen_preflight_sample.json --out reports/local/openssl_rsa_keygen_preflight.md
