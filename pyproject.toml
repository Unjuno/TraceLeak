[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "traceleak"
version = "0.1.0"
description = "Source-level neural/statistical leakage assessment for cryptographic implementations."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [
  { name = "Unjuno" }
]
keywords = [
  "cryptography",
  "side-channel",
  "leakage-assessment",
  "constant-time",
  "security-research"
]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
  "Topic :: Scientific/Engineering :: Information Analysis"
]
dependencies = []

[project.urls]
Homepage = "https://github.com/Unjuno/TraceLeak"
Repository = "https://github.com/Unjuno/TraceLeak"
Issues = "https://github.com/Unjuno/TraceLeak/issues"

[project.scripts]
traceleak-validate-trace = "scripts.validate_trace:main"
