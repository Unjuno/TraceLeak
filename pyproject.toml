[project.optional-dependencies]
dev = [
  "pytest>=8",
  "ruff>=0.6"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["traceleak*", "scripts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["external"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501", "I001"]

[tool.ruff.lint.per-file-ignores]
"traceleak/openssl_patch_materialization_approval_template.py" = ["F401"]
